<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Love Shack Cruises — Reservation & Quotation System v3"
    />

    <link
      rel="icon"
      href="https://www.loveshackcruises.com/wp-content/uploads/2020/06/Recurso-5.png"
      sizes="192x192"
    />
    <link
      rel="apple-touch-icon"
      href="https://www.loveshackcruises.com/wp-content/uploads/2020/06/Recurso-5.png"
    />

    <title>Love Shack Cruises — Reservations v3</title>

    <!-- Design System CSS -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/stepper.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/screens/clients.css" />
    <link rel="stylesheet" href="css/screens/sources.css" />
    <link rel="stylesheet" href="css/screens/data-compare.css" />
    <link rel="stylesheet" href="css/screens/settings.css" />
    <link rel="stylesheet" href="css/screens/menu.css" />
    <link rel="stylesheet" href="css/screens/yacht-pricing.css" />
    <link rel="stylesheet" href="css/voucher.css" />
    <link rel="stylesheet" href="css/datetime-picker.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme") || "light";
        if (savedTheme === "dark") {
          document.documentElement.classList.add("theme-dark");
          document.body.classList.add("theme-dark");
        }
      })();
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap");

      @import url("https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap");

      @import url("https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&display=swap");

      @import url("https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap");

      @import url("https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap");
    </style>
  </head>
  <body>
    <div class="app-shell">
      <!-- ===== Header ===== -->
      <header class="app-header" id="app-header">
        <span class="header-title"
          ><img
            src="https://www.loveshackcruises.com/wp-content/uploads/2025/06/newLogo.png"
            alt="Love Shack Cruises"
        /></span>
        <div class="header-right">
          <div class="header-actions">
            <button
              class="header-theme-toggle"
              id="header-theme-toggle"
              aria-label="Activate dark mode"
              role="switch"
              aria-checked="false"
            >
              <div class="toggle-theme-left">
                <svg class="icon" aria-hidden="true">
                  <use id="theme-icon-use" href="#icon-sun"></use>
                </svg>
              </div>
            </button>
            <button
              class="header-action-btn"
              onclick="window.App.navigate('#/data')"
              title="Manage Data"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                style="width: 22px; height: 22px"
              >
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
                />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <!-- ===== Main Content ===== -->
      <main class="app-main">
        <div id="app" data-behavior="hydrate-screens" data-step="dashboard">
          <!-- Screens are rendered here by the router -->
        </div>
      </main>

      <!-- ===== Scrim ===== -->
      <div class="scrim" id="scrim"></div>

      <!-- ===== Bottom Island Nav ===== -->
      <nav class="bottom-island" id="island" data-sheet-state="closed">
        <div data-behavior="handler-area" id="handler-area">
          <div class="handler"></div>
        </div>

        <div class="nav-content">
          <a href="#/dashboard" class="nav-btn main-nav-btn" aria-label="Home">
            <svg class="icon"><use href="#icon-house" /></svg>
          </a>
          <a
            href="#/source-list"
            class="nav-btn main-nav-btn"
            aria-label="Source List"
          >
            <svg class="icon"><use href="#icon-briefcase" /></svg>
          </a>
          <a
            href="#/clients-list"
            class="nav-btn main-nav-btn"
            aria-label="Clients List"
          >
            <svg class="icon"><use href="#icon-user" /></svg>
          </a>
          <a
            href="#/food-menu"
            class="nav-btn main-nav-btn"
            aria-label="Food Menu"
          >
            <svg class="icon"><use href="#icon-utensils" /></svg>
          </a>

          <button
            class="nav-btn main-nav-btn"
            id="menu-trigger"
            aria-label="Menu"
          >
            <svg class="icon menu-icon">
              <use id="menu-icon-use" href="#icon-list" />
            </svg>
          </button>
        </div>

        <div class="sheet-body">
          <div class="menu-grid">
            <button class="menu-item" id="menu-new-reservation" aria-label="Nueva Reservación">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10.16a10 10 0 1 1-5.16-5.16"></path>
                <path d="m9 11 3 3L22 4"></path>
              </svg>
              Nueva Reserva
            </button>
            <button class="menu-item" id="menu-share" aria-label="Share">
              <svg class="icon"><use href="#icon-share" /></svg>
              Share
            </button>
            <button class="menu-item" id="menu-reload" aria-label="Reload">
              <svg class="icon"><use href="#icon-reload" /></svg>
              Reload
            </button>
            <!-- Settings → unified tab: Preferencias -->
            <button class="menu-item" id="menu-settings" aria-label="Settings">
              <svg class="icon"><use href="#icon-gear" /></svg>
              Settings
            </button>
            <button class="menu-item" id="menu-stats" aria-label="Resumen">
              <svg class="icon"><use href="#icon-chart" /></svg>
              Resumen
            </button>
            <!-- Sync/Data → unified tab: Sincronizar -->
            <button class="menu-item" id="menu-sync" aria-label="Sync & Data">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
              </svg>
              Sync & Data
            </button>
            <!-- Compare → unified tab: Comparador -->
            <button class="menu-item" id="menu-compare" aria-label="Compare Data">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 20V10M12 20V4M6 20v-6"/>
                <circle cx="18" cy="7" r="2.5"/>
                <circle cx="6" cy="11" r="2.5"/>
              </svg>
              Compare
            </button>
            <button class="menu-item" id="menu-yacht-pricing" aria-label="Comparador Yates">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 3v18h18"/>
                <path d="M7 13l3-3 3 3 4-4"/>
                <circle cx="17" cy="9" r="1.5"/>
              </svg>
              Yates
            </button>
            <button
              class="menu-item toggle-theme"
              id="theme-toggle"
              aria-label="Toggle dark mode"
              role="switch"
              aria-checked="false"
            >
              <div class="toggle-theme-left">
                <svg class="icon" aria-hidden="true">
                  <use id="theme-icon-use" href="#icon-sun" />
                </svg>
                <span id="theme-label" aria-live="polite">Light Mode</span>
              </div>
              <div class="toggle-pill" aria-hidden="true"></div>
            </button>
          </div>
        </div>
      </nav>

      <!-- ===== FAB ===== -->
      <button class="fab" id="fab" aria-label="New Quote">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        >
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
      </button>

      <!-- ===== Toast Container ===== -->
      <div id="toast-container"></div>
    </div>

    <!-- ===== Bottom Island Styles ===== -->
    <style>
      .icon {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.7;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: block;
        flex-shrink: 0;
      }

      .icon .icon-secondary {
        opacity: 0.35;
      }

      .menu-item .icon {
        width: 28px;
        height: 28px;
        margin: 0 auto 8px;
        color: var(--color-gold);
      }

      .toggle-theme-left .icon {
        width: 20px;
        height: 20px;
        color: var(--color-gold);
      }

      .bottom-island {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        width: calc(100% - 32px);
        max-width: 650px;
        background: var(--color-island-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        z-index: 100;
        transition: var(--transition-main);
        box-shadow: var(--shadow-lg);
        display: flex;
        flex-direction: column;
        border: 1px solid var(--color-island-border);
        bottom: 20px;
        height: 64px;
        border-radius: var(--island-radius);
      }

      .bottom-island[data-sheet-state="small"] {
        bottom: 0;
        width: 100%;
        max-width: 100%;
        height: 380px;
        border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
        background: var(--color-surface);
        border: none;
      }

      .bottom-island[data-sheet-state="full"] {
        bottom: 0;
        width: 100%;
        max-width: 100%;
        height: 94vh;
        border-radius: var(--sheet-radius) var(--sheet-radius) 0 0;
        background: var(--color-surface);
        border: none;
      }

      [data-behavior="handler-area"] {
        width: 100%;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: grab;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }

      .bottom-island:not([data-sheet-state="closed"])
        [data-behavior="handler-area"] {
        opacity: 1;
        pointer-events: auto;
      }

      .handler {
        width: 36px;
        height: 5px;
        background: var(--color-border);
        border-radius: 3px;
        transition: var(--transition-fast);
      }

      [data-behavior="handler-area"]:active .handler {
        width: 48px;
        background: var(--color-text-tertiary);
      }

      .nav-content {
        display: flex;
        align-items: center;
        justify-content: space-evenly;
        padding: 8px;
        min-height: 64px;
        position: relative;
      }

      .nav-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--color-text-secondary);
        transition: var(--transition-main);
        flex-shrink: 0;
        border: none;
        background: transparent;
        cursor: pointer;
      }

      .nav-btn:hover {
        background: var(--color-surface-alt);
        color: var(--color-accent);
      }

      .nav-btn:active {
        transform: scale(0.88);
      }

      .sheet-body {
        flex: 1;
        padding: 0 24px 24px;
        overflow-y: auto;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .bottom-island:not([data-sheet-state="closed"]) .sheet-body {
        opacity: 1;
      }

      .menu-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-top: 10px;
      }

      .custom-select-wrapper {
        position: relative;
        width: 100%;
        z-index: 1; /* Base level */
      }

      .custom-select-wrapper.open {
        z-index: 9999 !important;
      }

      /* If a step-section contains an open select, it must also go on top */
      .step-section:has(.custom-select-wrapper.open) {
        position: relative;
        z-index: 9999;
      }

      .custom-select-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        margin-top: 4px;
        max-height: 250px;
        overflow-y: auto;
        z-index: 9999 !important;
        display: none;
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.2),
          0 8px 10px -6px rgba(0, 0, 0, 0.1);
      }

      .menu-item {
        background: var(--color-surface);
        border: 1px solid var(--color-border);
        padding: 20px;
        border-radius: var(--radius-xl);
        text-align: center;
        font-weight: 600;
        color: var(--color-text);
        transition: var(--transition-fast);
        cursor: pointer;
      }

      .menu-item:active {
        transform: scale(0.96);
        background: var(--color-surface-alt);
      }

      .menu-item.toggle-theme {
        grid-column: span 2;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        text-align: left;
        padding: 16px 20px;
        margin-top: 4px;
        border-top: 1px solid var(--color-border-subtle);
      }

      .toggle-theme-left {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 15px;
        font-weight: 500;
      }

      .toggle-pill {
        width: 44px;
        height: 26px;
        border-radius: 13px;
        background: var(--color-surface-raised);
        position: relative;
        transition: background 0.25s ease;
        flex-shrink: 0;
      }

      .toggle-pill::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #ffffff;
        top: 3px;
        left: 3px;
        transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1);
        box-shadow: var(--shadow-sm);
      }

      body.theme-dark .toggle-pill::after {
        transform: translateX(18px);
      }

      .scrim {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s;
        z-index: 90;
        backdrop-filter: blur(4px);
      }

      body:has([data-sheet-state="full"]) .scrim,
      body:has([data-sheet-state="small"]) .scrim {
        opacity: 1;
        pointer-events: auto;
      }

      [data-sheet-state="closed"] #handler-area {
        display: none;
      }

      .menu-icon {
        transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      }

      .bottom-island[data-sheet-state="small"] .menu-icon,
      .bottom-island[data-sheet-state="full"] .menu-icon {
        transform: rotate(90deg);
      }

      [data-sheet-state]:not([data-sheet-state="closed"]) {
        z-index: 999;
      }
    </style>

    <script src="js/components/stepper-bar.js"></script>
    <script src="js/components/datetime-picker.js"></script>
    <script src="js/components/delete-dialog.js"></script>

    <!-- Screens -->
    <script src="js/screens/dashboard.js"></script>
    <script src="js/screens/step1-pricing.js"></script>
    <script src="js/screens/step2-details.js"></script>
    <script src="js/screens/step3-adjustments.js"></script>
    <script src="js/screens/source-list.js"></script>
    <script src="js/screens/clients-list.js"></script>
    <script src="js/screens/food-menu.js"></script>
    <script src="js/screens/filter.js"></script>
    <script src="js/screens/settings.js"></script>
    <script src="js/screens/voucher.js"></script>
    <script src="js/screens/data-compare.js"></script>
    <script src="js/screens/yacht-pricing.js"></script>

    <!-- App Orchestrator (must be last) -->
    <script src="js/app.js"></script>

    <!-- ===== Bottom Island JS ===== -->
    <script>
      const island = document.getElementById("island");
      const menuTrigger = document.getElementById("menu-trigger");
      const handlerArea = document.getElementById("handler-area");
      const scrim = document.getElementById("scrim");

      const updateMenuIcon = () => {
        const isClosed = island.dataset.sheetState === "closed";
        const useX = !isClosed;
        const menuIconUse = document.getElementById("menu-icon-use");
        if (menuIconUse) {
          menuIconUse.setAttribute("href", useX ? "#icon-x" : "#icon-list");
        }
        menuTrigger.setAttribute("aria-label", useX ? "Close" : "Menu");
      };

      const toggleSheet = () => {
        if (island.dataset.sheetState !== "closed") {
          island.dataset.sheetState = "closed";
        } else {
          island.dataset.sheetState = "small";
        }
        updateMenuIcon();
      };

      menuTrigger.addEventListener("click", toggleSheet);

      scrim.addEventListener("click", () => {
        island.dataset.sheetState = "closed";
        updateMenuIcon();
      });

      let startY = 0;
      let endY = 0;

      const handleSwipe = () => {
        const diff = startY - endY;
        const state = island.dataset.sheetState;
        if (diff > 50) {
          if (state === "small") island.dataset.sheetState = "full";
        } else if (diff < -50) {
          if (state === "full") island.dataset.sheetState = "small";
          else if (state === "small") island.dataset.sheetState = "closed";
        }
        updateMenuIcon();
      };

      handlerArea.addEventListener(
        "touchstart",
        (e) => (startY = e.touches[0].clientY),
        { passive: true },
      );
      handlerArea.addEventListener(
        "touchend",
        (e) => {
          endY = e.changedTouches[0].clientY;
          handleSwipe();
        },
        { passive: true },
      );

      handlerArea.addEventListener("mousedown", (e) => {
        startY = e.clientY;
        const up = (me) => {
          endY = me.clientY;
          handleSwipe();
          document.removeEventListener("mouseup", up);
        };
        document.addEventListener("mouseup", up);
      });

      updateMenuIcon();

      // Menu Button Actions
      document.getElementById("menu-new-reservation").addEventListener("click", () => {
        island.dataset.sheetState = "closed";
        updateMenuIcon();
        
        const draft = window.Storage.createDraft();
        const all = window.Storage.getAllReservations();
        const idx = all.findIndex(r => r.id === draft.id);
        if (idx !== -1) {
          all[idx].flowMode = 'new-reservation';
          window.Storage.saveAll(all);
        }
        window.App.navigate(`#/new-reservation/${draft.id}`);
        window.Toast.success('Nueva reservación directa iniciada');
      });

      document
        .getElementById("menu-share")
        .addEventListener("click", async () => {
          if (navigator.share) {
            try {
              await navigator.share({
                title: "Love Shack Cruises — Reservations",
                text: "Sistema de Reservas v3",
                url: window.location.href,
              });
            } catch (err) {
              console.log("Error sharing:", err);
            }
          } else {
            alert("Tu navegador no soporta la función de compartir.");
          }
        });

      document.getElementById("menu-reload").addEventListener("click", () => {
        location.reload();
      });

      document.getElementById("menu-settings").addEventListener("click", () => {
        island.dataset.sheetState = "closed";
        updateMenuIcon();
        window.App.navigate("#/settings"); // → Preferencias tab
      });

      document.getElementById("menu-stats").addEventListener("click", () => {
        island.dataset.sheetState = "closed";
        updateMenuIcon();
        window.App.navigate("#/filter");
      });

      document.getElementById("menu-sync").addEventListener("click", () => {
        island.dataset.sheetState = "closed";
        updateMenuIcon();
        window.App.navigate("#/data"); // → Sincronizar tab
      });

      document.getElementById("menu-compare").addEventListener("click", () => {
        island.dataset.sheetState = "closed";
        updateMenuIcon();
        window.App.navigate("#/compare"); // → Comparador tab
      });

      document.getElementById("menu-yacht-pricing").addEventListener("click", () => {
        island.dataset.sheetState = "closed";
        updateMenuIcon();
        window.App.navigate("#/yacht-pricing");
      });
    </script>
  </body>
</html>
