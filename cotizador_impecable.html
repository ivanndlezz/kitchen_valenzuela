<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiencia de Cotización Impecable</title>
  
  <!-- Tipografía premium: Inter (sutil, geométrica, legible) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS para el sistema de diseño -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons para iconografía limpia y moderna -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            // Paleta inspirada en Apple / Google
            ui: {
              50: '#f9fafb',
              100: '#f3f4f6',
              200: '#e5e7eb',
              300: '#d1d5db',
              400: '#9ca3af',
              500: '#6b7280',
              600: '#4b5563',
              700: '#374151',
              800: '#1f2937',
              900: '#111827',
              blue: '#0A84FF', // Apple Blue
              green: '#34C759', // Apple Green
            }
          },
          boxShadow: {
            'apple': '0 4px 24px -4px rgba(0, 0, 0, 0.05), 0 1px 4px -1px rgba(0, 0, 0, 0.03)',
            'apple-hover': '0 12px 32px -4px rgba(0, 0, 0, 0.08), 0 4px 8px -2px rgba(0, 0, 0, 0.04)',
          }
        }
      }
    }
  </script>

  <style>
    /* Ocultar las flechas de los inputs numéricos para un aspecto más limpio */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
    
    /* Ajustes WYSIWYG de inputs - Efecto invisible hasta focus/hover */
    .input-ghost {
      transition: all 0.15s ease;
      background: transparent;
    }
    .input-ghost:hover {
      background-color: rgba(0,0,0,0.04);
    }
    .input-ghost:focus {
      background-color: #fff;
      box-shadow: 0 0 0 2px #0A84FF;
      outline: none;
    }

    /* Popover Transitions */
    .popover-panel {
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px) scale(0.98);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .popover-panel.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    /* Row Animations */
    .row-enter {
      animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .row-exit {
      animation: slideUp 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.95); height: 0; padding-top: 0; padding-bottom: 0; margin: 0; overflow: hidden; border-width: 0; }
    }

    /* Print Mode */
    @media print {
      body { background: white; padding: 0; }
      main { box-shadow: none; border: none; max-width: 100%; }
      .no-print { display: none !important; }
      .input-ghost { pointer-events: none; }
      textarea { resize: none; }
    }
  </style>
</head>
<body class="bg-[#f5f5f7] min-h-screen p-2 md:p-8 text-ui-900 antialiased selection:bg-ui-blue selection:text-white flex flex-col items-center justify-start gap-4">

  <!-- Topbar de Acciones (Fuera del documento) -->
  <div class="w-full max-w-5xl flex justify-between items-center px-4 no-print animate-in">
    <div class="flex items-center gap-2">
      <span class="flex items-center gap-1.5 px-2.5 py-1 rounded-md bg-emerald-100 text-emerald-700 text-xs font-semibold tracking-wide border border-emerald-200">
        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></div>
        Borrador Autoguardado
      </span>
    </div>
    <div class="flex gap-2">
      <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 bg-white border border-ui-200 text-ui-700 rounded-xl hover:bg-ui-50 shadow-sm transition-all text-sm font-medium">
        <i data-lucide="printer" class="w-4 h-4"></i> Imprimir / PDF
      </button>
      <button class="flex items-center gap-2 px-4 py-2 bg-ui-blue border border-ui-blue text-white rounded-xl hover:bg-blue-600 shadow-sm transition-all text-sm font-medium shadow-blue-500/20">
        <i data-lucide="send" class="w-4 h-4"></i> Enviar Cliente
      </button>
    </div>
  </div>

  <!-- Documento de Cotización (El "Papel") -->
  <main class="w-full max-w-5xl bg-white rounded-2xl shadow-apple border border-ui-200 overflow-hidden relative">
    
    <!-- Cabecera del documento -->
    <header class="p-6 md:px-8 border-b border-ui-100 relative">
      <div class="absolute top-8 right-8 text-ui-200 no-print">
        <i data-lucide="building-2" class="w-12 h-12"></i>
      </div>
      <input type="text" value="Cotización para Proyecto Residencial" class="text-3xl font-bold w-full md:w-3/4 input-ghost rounded-lg px-2 -ml-2 text-ui-900 placeholder:text-ui-300">
      <div class="flex items-center gap-2 mt-1 px-2 -ml-2">
        <input type="text" value="#COT-2026-089" class="text-ui-500 text-sm font-medium input-ghost rounded w-32 px-1 -ml-1">
        <span class="text-ui-300">•</span>
        <input type="text" value="17 de Junio, 2026" class="text-ui-500 text-sm input-ghost rounded w-40 px-1">
      </div>
    </header>

    <!-- Encabezados de Tabla -->
    <div class="hidden md:flex items-center px-8 py-3 bg-ui-50/50 border-b border-ui-100 text-xs font-semibold text-ui-500 uppercase tracking-wider">
      <div class="w-8"></div> <!-- Handle space -->
      <div class="flex-1">Concepto</div>
      <div class="w-28 text-center">Cant.</div>
      <div class="w-32 text-right">Precio Unit.</div>
      <div class="w-32 text-right">Subtotal</div>
      <div class="w-16 no-print"></div>
    </div>

    <!-- Contenedor Dinámico de Productos -->
    <div id="items-container" class="flex flex-col min-h-[100px]">
      <!-- Las filas se renderizan aquí por JS -->
    </div>

    <!-- Estado Vacío -->
    <div id="empty-state" class="hidden flex-col items-center justify-center py-12 px-4 text-center">
      <div class="w-16 h-16 bg-ui-50 text-ui-300 rounded-2xl flex items-center justify-center mb-4 border border-ui-100">
        <i data-lucide="package-open" class="w-8 h-8"></i>
      </div>
      <h3 class="text-lg font-semibold text-ui-900 mb-1">Cotización vacía</h3>
      <p class="text-sm text-ui-500 mb-4 max-w-sm">Agrega conceptos, productos o servicios para comenzar a calcular.</p>
    </div>

    <!-- Botón Agregar (Se mueve al final de la lista) -->
    <button id="btn-add-row" class="no-print flex items-center gap-2 text-ui-500 hover:text-ui-blue text-sm font-medium px-8 py-4 transition-colors w-full text-left border-b border-ui-100 hover:bg-ui-50/50 focus:outline-none">
      <i data-lucide="plus-circle" class="w-4 h-4"></i>
      Agregar nuevo concepto
    </button>

    <!-- Totales Globales Documento -->
    <footer class="p-6 md:p-8 bg-ui-50/30 flex flex-col md:flex-row justify-between items-end md:items-start gap-8">
      
      <!-- Notas Generales -->
      <div class="w-full md:w-1/2">
        <label class="block text-xs font-semibold text-ui-500 uppercase tracking-wider mb-2">Notas y Condiciones</label>
        <textarea class="w-full text-sm text-ui-600 bg-transparent input-ghost rounded border border-transparent hover:border-ui-200 focus:border-ui-blue focus:bg-white p-2 min-h-[80px] resize-none" placeholder="Términos de pago, vigencia de la cotización, etc...">Vigencia de cotización: 15 días.
Tiempo de entrega: 3 a 5 días hábiles tras anticipo.</textarea>
      </div>

      <!-- Matemáticas Globales -->
      <div class="w-full md:w-72 space-y-2">
        <div class="flex justify-between text-sm text-ui-600 px-2">
          <span>Subtotal Conceptos</span>
          <span id="doc-subtotal" class="font-medium">$0.00</span>
        </div>
        
        <!-- Descuento Global -->
        <div class="flex justify-between items-center text-sm px-2 group">
          <span class="text-ui-600 flex items-center gap-1 cursor-pointer hover:text-ui-900" title="Click para cambiar tipo">
            Descuento 
            <select id="doc-discount-type" class="text-xs bg-transparent text-ui-400 outline-none cursor-pointer appearance-none">
              <option value="percent">(%)</option>
              <option value="amount">($)</option>
            </select>
          </span>
          <div class="flex items-center text-red-500 font-medium">
            -<input id="doc-discount-val" type="number" value="0" class="w-16 text-right bg-transparent outline-none input-ghost rounded px-1">
          </div>
        </div>

        <div class="flex justify-between text-sm text-ui-600 px-2">
          <span>Envío Consolidado</span>
          <span id="doc-shipping" class="font-medium">$0.00</span>
        </div>

        <!-- Impuesto (IVA) -->
        <div class="flex justify-between items-center text-sm px-2">
          <span class="text-ui-600">IVA (16%)</span>
          <div class="flex items-center font-medium">
            <span id="doc-tax">$0.00</span>
          </div>
        </div>

        <div class="h-px bg-ui-200 my-3"></div>
        
        <div class="flex justify-between items-center px-2">
          <span class="font-bold text-ui-900 text-lg">Total a Pagar</span>
          <span id="doc-total" class="text-2xl font-black text-ui-blue">$0.00</span>
        </div>
        
        <!-- Rentabilidad Global (Solo visible para vendedor, no se imprime) -->
        <div class="mt-4 p-3 bg-emerald-50 rounded-lg border border-emerald-100 no-print flex justify-between items-center text-xs">
          <span class="font-medium text-emerald-800">Rentabilidad Global</span>
          <span class="font-bold text-emerald-700" id="doc-global-margin">0.0%</span>
        </div>
      </div>
    </footer>
  </main>

  <!-- ========================================== -->
  <!-- TEMPLATE DE FILA (Oculto, usado por JS)    -->
  <!-- ========================================== -->
  <template id="row-template">
    <article class="row-enter group relative flex flex-col md:flex-row items-start md:items-center px-2 md:px-8 py-3 md:py-2 border-b border-ui-100 hover:bg-ui-50/50 transition-colors">
      
      <!-- Drag Handle (Visual only for now) -->
      <div class="hidden md:flex w-8 items-center justify-start text-ui-300 cursor-move opacity-0 group-hover:opacity-100 transition-opacity no-print">
        <i data-lucide="grip-vertical" class="w-4 h-4"></i>
      </div>

      <!-- 1. Identidad (Concepto) -->
      <div class="flex-1 w-full md:w-auto pr-4 mb-3 md:mb-0 ml-2 md:ml-0">
        <textarea class="item-name w-full text-sm md:text-base font-semibold input-ghost rounded px-2 -ml-2 py-1 resize-none overflow-hidden" placeholder="Descripción del concepto" rows="1"></textarea>
        <div class="flex items-center gap-2 px-2 -ml-2 mt-0.5">
          <input type="text" class="item-sku text-xs text-ui-500 input-ghost rounded px-1 -ml-1 w-24" placeholder="SKU / Cód.">
          <span class="text-ui-300 text-xs">•</span>
          <input type="text" class="item-brand text-xs text-ui-400 input-ghost rounded px-1 w-24" placeholder="Marca/Ref">
        </div>
      </div>

      <div class="flex items-center justify-between w-full md:w-auto gap-4 pl-2 md:pl-0">
        <!-- 2. Cantidad -->
        <div class="w-auto md:w-28 flex items-center justify-center">
          <div class="flex items-center bg-white border border-ui-200 rounded-md hover:border-ui-400 focus-within:border-ui-blue focus-within:ring-1 focus-within:ring-ui-blue transition-all">
            <button class="btn-minus px-2 py-1 text-ui-400 hover:text-ui-700 focus:outline-none no-print">−</button>
            <input type="number" min="0.1" step="0.1" class="item-qty w-10 text-center text-sm font-semibold bg-transparent outline-none">
            <button class="btn-plus px-2 py-1 text-ui-400 hover:text-ui-700 focus:outline-none no-print">+</button>
          </div>
        </div>

        <!-- 3. Precio Unitario -->
        <div class="w-24 md:w-32 flex justify-end">
          <div class="relative flex items-center group-hover:bg-white border border-transparent group-hover:border-ui-200 focus-within:border-ui-blue focus-within:bg-white focus-within:ring-1 focus-within:ring-ui-blue rounded-md px-2 py-1 transition-all">
            <span class="text-ui-400 text-sm mr-1">$</span>
            <input type="number" min="0" step="0.01" class="item-price w-full text-right text-sm font-semibold bg-transparent outline-none">
          </div>
        </div>

        <!-- 4. Subtotal -->
        <div class="w-24 md:w-32 text-right">
          <span class="text-xs text-ui-400 md:hidden block mb-0.5">Subtotal</span>
          <span class="display-subtotal text-base font-bold text-ui-900 px-2">$0.00</span>
        </div>
        
        <!-- 5. Acciones y Popover -->
        <div class="w-auto md:w-16 flex justify-end relative no-print">
          <div class="flex items-center opacity-100 md:opacity-0 group-hover:opacity-100 focus-within:opacity-100 transition-opacity gap-1">
            <button class="btn-settings p-1.5 text-ui-400 hover:text-ui-blue hover:bg-blue-50 rounded-md transition-colors" title="Ajustes de línea">
              <i data-lucide="sliders-horizontal" class="w-4 h-4"></i>
            </button>
            <button class="btn-delete p-1.5 text-ui-400 hover:text-red-500 hover:bg-red-50 rounded-md transition-colors" title="Eliminar concepto">
              <i data-lucide="x" class="w-4 h-4"></i>
            </button>
          </div>

          <!-- Popover -->
          <div class="popover-settings popover-panel absolute right-0 top-full mt-2 w-72 bg-white rounded-xl shadow-apple border border-ui-200 z-50 p-4 cursor-default">
            <div class="flex items-center justify-between mb-4 pb-2 border-b border-ui-100">
              <h4 class="text-sm font-semibold text-ui-900">Configuración Financiera</h4>
              <div class="text-xs font-medium px-2 py-1 bg-emerald-50 text-emerald-700 rounded-md">
                Margen: <span class="display-margin">0.0%</span>
              </div>
            </div>
            <!-- Costos -->
            <div class="space-y-3 mb-4">
              <div class="flex items-center justify-between">
                <label class="text-xs text-ui-500">Costo Base</label>
                <div class="flex items-center">
                  <span class="text-ui-400 text-xs mr-1">$</span>
                  <input type="number" class="item-cost w-20 text-right text-sm font-medium border border-ui-200 rounded px-2 py-0.5 focus:border-ui-blue outline-none">
                </div>
              </div>
              <div class="flex items-center justify-between">
                <label class="text-xs text-ui-500">Costo Traslado</label>
                <div class="flex items-center">
                  <span class="text-ui-400 text-xs mr-1">$</span>
                  <input type="number" class="item-transfer w-20 text-right text-sm font-medium border border-ui-200 rounded px-2 py-0.5 focus:border-ui-blue outline-none">
                </div>
              </div>
            </div>
            <!-- Utilidad -->
            <div class="bg-ui-50 p-3 rounded-lg border border-ui-100 mb-4">
              <label class="block text-xs font-medium text-ui-600 mb-2">Utilidad Esperada</label>
              <div class="flex border border-ui-200 rounded-md overflow-hidden bg-white">
                <select class="item-util-type bg-ui-100 border-none text-xs font-semibold px-2 py-1 outline-none cursor-pointer">
                  <option value="percent">%</option>
                  <option value="amount">$</option>
                </select>
                <input type="number" class="item-util-val w-full text-right text-sm font-medium px-2 py-1 outline-none">
              </div>
            </div>
            <!-- Envío -->
            <div>
              <label class="block text-xs font-medium text-ui-600 mb-2">Cargo por envío al cliente</label>
              <div class="flex items-center border border-ui-200 rounded-md px-2 py-1 focus-within:border-ui-blue transition-colors bg-white">
                <span class="text-ui-400 text-xs mr-1">$</span>
                <input type="number" class="item-shipping w-full text-right text-sm font-medium outline-none placeholder:text-ui-300" placeholder="0.00">
              </div>
            </div>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script>
    // Inicializar Iconos globalmente
    lucide.createIcons();

    // Utilidades
    const fmtCurrency = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
    const fmtPercent = new Intl.NumberFormat('en-US', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 2 });

    // Auto-resize textarea function
    function autoResizeTextarea(ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }

    // ==========================================
    // CLASE: Documento Global (The App)
    // ==========================================
    class QuoteDocument {
      constructor() {
        this.items = [];
        this.globalConfig = {
          discountType: 'percent',
          discountValue: 0,
          taxRate: 0.16 // 16% IVA
        };

        // DOM Referencias globales
        this.container = document.getElementById('items-container');
        this.emptyState = document.getElementById('empty-state');
        this.btnAddRow = document.getElementById('btn-add-row');
        
        this.dom = {
          subtotal: document.getElementById('doc-subtotal'),
          discountType: document.getElementById('doc-discount-type'),
          discountVal: document.getElementById('doc-discount-val'),
          shipping: document.getElementById('doc-shipping'),
          tax: document.getElementById('doc-tax'),
          total: document.getElementById('doc-total'),
          globalMargin: document.getElementById('doc-global-margin')
        };

        this.initEvents();
        this.addInitialRow(); // Agregar fila de ejemplo
      }

      initEvents() {
        this.btnAddRow.addEventListener('click', () => this.addRow());

        this.dom.discountVal.addEventListener('input', (e) => {
          this.globalConfig.discountValue = parseFloat(e.target.value) || 0;
          this.calculateTotals();
        });

        this.dom.discountType.addEventListener('change', (e) => {
          this.globalConfig.discountType = e.target.value;
          this.calculateTotals();
        });

        // Click outside para cerrar popovers
        document.addEventListener('click', (e) => {
          this.items.forEach(item => {
            if (!item.popover.contains(e.target) && !item.btnSettings.contains(e.target)) {
              item.closePopover();
            }
          });
        });
      }

      addRow(initialData = null) {
        const row = new QuoteRow(this, initialData);
        this.items.push(row);
        this.container.appendChild(row.element);
        this.updateUIState();
        this.calculateTotals();
        
        // Auto-focus en el concepto si es nuevo
        if(!initialData) {
          setTimeout(() => row.inputs.name.focus(), 50);
        }
      }

      removeRow(rowInstance) {
        // Animación de salida
        rowInstance.element.classList.remove('row-enter');
        rowInstance.element.classList.add('row-exit');
        
        setTimeout(() => {
          rowInstance.element.remove();
          this.items = this.items.filter(item => item !== rowInstance);
          this.updateUIState();
          this.calculateTotals();
        }, 200); // Coincide con la duración de la animación en CSS
      }

      updateUIState() {
        if (this.items.length === 0) {
          this.emptyState.classList.remove('hidden');
          this.emptyState.classList.add('flex');
        } else {
          this.emptyState.classList.add('hidden');
          this.emptyState.classList.remove('flex');
        }
      }

      closeAllPopoversExcept(exceptRow) {
        this.items.forEach(item => {
          if (item !== exceptRow) item.closePopover();
        });
      }

      calculateTotals() {
        let subtotal = 0;
        let totalShipping = 0;
        let totalCost = 0;

        this.items.forEach(item => {
          const itemSubtotal = item.state.price * item.state.qty;
          subtotal += itemSubtotal;
          totalShipping += item.state.shipping;
          totalCost += (item.state.baseCost + item.state.transferCost) * item.state.qty;
        });

        // Descuento
        let discountAmount = 0;
        if (this.globalConfig.discountType === 'percent') {
          discountAmount = subtotal * (this.globalConfig.discountValue / 100);
        } else {
          discountAmount = this.globalConfig.discountValue;
        }

        const subtotalAfterDiscount = subtotal - discountAmount;
        
        // IVA (Calculado sobre subtotal descontado + envío)
        const taxableAmount = subtotalAfterDiscount + totalShipping;
        const taxAmount = taxableAmount * this.globalConfig.taxRate;
        
        const grandTotal = taxableAmount + taxAmount;

        // Rentabilidad (Venta sin IVA - Costos totales)
        const totalRevenue = subtotalAfterDiscount; // El envío es pass-through idealmente
        const globalMargin = totalRevenue > 0 ? (totalRevenue - totalCost) / totalRevenue : 0;

        // Render Global
        this.dom.subtotal.innerText = fmtCurrency.format(subtotal);
        this.dom.shipping.innerText = fmtCurrency.format(totalShipping);
        this.dom.tax.innerText = fmtCurrency.format(taxAmount);
        this.dom.total.innerText = fmtCurrency.format(grandTotal);
        this.dom.globalMargin.innerText = fmtPercent.format(globalMargin);
        
        // Color alert si margen es negativo
        this.dom.globalMargin.className = globalMargin < 0 
          ? 'font-bold text-red-600' 
          : 'font-bold text-emerald-700';
      }

      addInitialRow() {
        this.addRow({
          name: 'Codo Calle 90° de 1/2" Cobre',
          sku: 'COD-1/2-C',
          brand: 'NIBCO',
          qty: 12,
          price: 45.50,
          baseCost: 32.00,
          utilType: 'percent',
          utilValue: 42.18
        });
        this.addRow({
          name: 'Mano de obra (Instalación de tubería)',
          sku: 'SRV-001',
          brand: 'Interno',
          qty: 1,
          price: 1500.00,
          baseCost: 800.00,
          utilType: 'percent',
          utilValue: 87.5
        });
      }
    }

    // ==========================================
    // CLASE: Fila de Cotización (Componente)
    // ==========================================
    class QuoteRow {
      constructor(appInstance, initialData = null) {
        this.app = appInstance;
        this.state = {
          qty: 1,
          price: 0,
          baseCost: 0,
          transferCost: 0,
          utilType: 'percent',
          utilValue: 0,
          shipping: 0,
          ...initialData
        };

        // Construir DOM desde Template
        const template = document.getElementById('row-template');
        const clone = template.content.cloneNode(true);
        this.element = clone.querySelector('article');

        // Bind DOM Elements
        this.inputs = {
          name: this.element.querySelector('.item-name'),
          sku: this.element.querySelector('.item-sku'),
          brand: this.element.querySelector('.item-brand'),
          qty: this.element.querySelector('.item-qty'),
          price: this.element.querySelector('.item-price'),
          cost: this.element.querySelector('.item-cost'),
          transfer: this.element.querySelector('.item-transfer'),
          utilType: this.element.querySelector('.item-util-type'),
          utilVal: this.element.querySelector('.item-util-val'),
          shipping: this.element.querySelector('.item-shipping'),
        };

        this.displays = {
          subtotal: this.element.querySelector('.display-subtotal'),
          margin: this.element.querySelector('.display-margin'),
        };

        this.btnMinus = this.element.querySelector('.btn-minus');
        this.btnPlus = this.element.querySelector('.btn-plus');
        this.btnSettings = this.element.querySelector('.btn-settings');
        this.btnDelete = this.element.querySelector('.btn-delete');
        this.popover = this.element.querySelector('.popover-settings');

        this.initData();
        this.initEvents();
        this.render();
        
        // Inyectar iconos en esta nueva fila
        lucide.createIcons({ root: this.element });
      }

      initData() {
        if (this.state.name) this.inputs.name.value = this.state.name;
        if (this.state.sku) this.inputs.sku.value = this.state.sku;
        if (this.state.brand) this.inputs.brand.value = this.state.brand;
        
        // Auto-resize on init
        setTimeout(() => autoResizeTextarea(this.inputs.name), 0);
      }

      initEvents() {
        // Auto-resize textarea
        this.inputs.name.addEventListener('input', (e) => autoResizeTextarea(e.target));

        // Math Events
        this.btnMinus.addEventListener('click', () => { this.state.qty = Math.max(0.1, this.state.qty - 1); this.renderAndNotify(); });
        this.btnPlus.addEventListener('click', () => { this.state.qty += 1; this.renderAndNotify(); });
        
        this.bindInput('qty', 'qty');
        this.bindInput('price', 'price', this.calculateFromPrice.bind(this));
        this.bindInput('cost', 'baseCost', this.calculateFromUtility.bind(this));
        this.bindInput('transfer', 'transferCost', this.calculateFromUtility.bind(this));
        this.bindInput('utilVal', 'utilValue', this.calculateFromUtility.bind(this));
        this.bindInput('shipping', 'shipping');

        this.inputs.utilType.addEventListener('change', (e) => {
          this.state.utilType = e.target.value;
          this.calculateFromPrice(); 
          this.renderAndNotify();
        });

        // UI Events
        this.btnDelete.addEventListener('click', () => this.app.removeRow(this));
        
        this.btnSettings.addEventListener('click', (e) => {
          e.stopPropagation();
          const isOpen = this.popover.classList.contains('open');
          this.app.closeAllPopoversExcept(this);
          
          if (!isOpen) {
            this.popover.classList.add('open');
            this.btnSettings.classList.add('text-ui-blue', 'bg-blue-50');
          } else {
            this.closePopover();
          }
        });

        // Evitar que clicks en popover cierren el popover
        this.popover.addEventListener('click', e => e.stopPropagation());
      }

      // Helper para vincular inputs al estado fácilmente
      bindInput(inputKey, stateKey, callback = null) {
        this.inputs[inputKey].addEventListener('input', (e) => {
          const val = parseFloat(e.target.value);
          if (!isNaN(val)) {
            this.state[stateKey] = val;
            if (callback) callback();
            this.renderAndNotify();
          }
        });
      }

      closePopover() {
        this.popover.classList.remove('open');
        this.btnSettings.classList.remove('text-ui-blue', 'bg-blue-50');
      }

      // Matemáticas Locales
      getTotalCost() { return this.state.baseCost + this.state.transferCost; }

      calculateFromUtility() {
        const cost = this.getTotalCost();
        if (this.state.utilType === 'percent') {
          this.state.price = cost * (1 + (this.state.utilValue / 100));
        } else {
          this.state.price = cost + this.state.utilValue;
        }
      }

      calculateFromPrice() {
        const cost = this.getTotalCost();
        const difference = this.state.price - cost;
        if (this.state.utilType === 'percent') {
          this.state.utilValue = cost > 0 ? (difference / cost) * 100 : 0;
        } else {
          this.state.utilValue = difference;
        }
      }

      getMargin() {
        const cost = this.getTotalCost();
        if (this.state.price <= 0) return 0;
        return (this.state.price - cost) / this.state.price;
      }

      render() {
        // Actualizar valores de input sin robar focus
        const updateVal = (input, val) => { if (document.activeElement !== input) input.value = val; };
        
        updateVal(this.inputs.qty, this.state.qty);
        updateVal(this.inputs.price, this.state.price.toFixed(2));
        updateVal(this.inputs.cost, this.state.baseCost.toFixed(2));
        updateVal(this.inputs.transfer, this.state.transferCost.toFixed(2));
        updateVal(this.inputs.utilVal, this.state.utilValue.toFixed(2));
        updateVal(this.inputs.shipping, this.state.shipping.toFixed(2));
        this.inputs.utilType.value = this.state.utilType;

        // Textos display
        this.displays.subtotal.innerText = fmtCurrency.format(this.state.price * this.state.qty);
        
        const margin = this.getMargin();
        this.displays.margin.innerText = fmtPercent.format(margin);
        this.displays.margin.className = `display-margin ${margin < 0 ? 'text-red-600' : 'text-emerald-700'}`;
      }

      renderAndNotify() {
        this.render();
        this.app.calculateTotals();
      }
    }

    // Inicializar Aplicación
    document.addEventListener('DOMContentLoaded', () => {
      window.QuoteApp = new QuoteDocument();
    });

  </script>
</body>
</html>
